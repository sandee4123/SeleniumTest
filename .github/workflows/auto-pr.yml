name: Auto PR

on:
  push:
    branches:
      - '**'
      - '!main'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          TITLE=$(git log -1 --pretty=%s)

          if [ -z "$TITLE" ]; then
            TITLE="Auto PR: $BRANCH"
          fi

          # ✅ Check ONLY for OPEN PRs (fixes your issue)
          if gh pr list --head "$BRANCH" --state open --json number --jq 'length > 0'; then
            echo "Open PR already exists for $BRANCH"
            exit 0
          fi

          # 🚀 Create PR
          gh pr create \
            --title "$TITLE" \
            --body "Automated PR for branch $BRANCH" \
            --base main \
            --head "$BRANCH"
