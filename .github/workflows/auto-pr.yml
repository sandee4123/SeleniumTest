name: Auto PR

on:
  push:
    branches:
      - '**'
      - '!main'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show branch info
        run: |
          echo "ref_name=${{ github.ref_name }}"
          echo "ref=${{ github.ref }}"

      - name: Check for open PR
        id: prcheck
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ github.ref_name }}"
          BASE="main"

          echo "Checking open PRs for branch: $BRANCH -> $BASE"

          PR_NUMBERS=$(gh pr list \
            --head "$BRANCH" \
            --base "$BASE" \
            --state open \
            --json number \
            --jq '.[].number')

          if [ -z "$PR_NUMBERS" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No open PR found"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Open PR(s): $PR_NUMBERS"
          fi

      - name: Create PR if not exists
        if: steps.prcheck.outputs.found == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ github.ref_name }}"
          TITLE=$(git log -1 --pretty=%s)

          if [ -z "$TITLE" ]; then
            TITLE="Auto PR: $BRANCH"
          fi

          echo "Creating PR for branch: $BRANCH"

          gh pr create \
            --title "$TITLE" \
            --body "Automated PR for branch $BRANCH" \
            --base main \
            --head "$BRANCH"

      - name: Done
        run: echo "Workflow complete"
